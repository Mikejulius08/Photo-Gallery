<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Interactive Photo Gallery</h1>

<div id="image">
    Hover over an image below to display here.
</div>

<div class="gallery">

    <img src="Intra.jpg"
         alt="Image One"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="Plane.jpg"
         alt="Image Two"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="Wall.jpg"
         alt="Image Three"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="Sky.jpg"
         alt="Image Four"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="Mapua.jpg"
         alt="Image Five"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="Manila.jpg"
         alt="Image Six"
         onmouseover="upDate(this)"
         onmouseout="undo()">

</div>

<script src="script.js"></script>

</body>
</html>
